<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUDO REACTION 16-BIT PRO</title>
    <!-- Retro Pixel Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-size: 4px;
            --tatami-yellow: #d4bc82;
            --tatami-border: #8b7355;
            --dojo-wall: #e0d7c6;
            --white-gi: #ffffff;
            --white-gi-shadow: #d1d1d1;
            --blue-gi: #2b5797;
            --blue-gi-shadow: #1a3a63;
            --skin-tone: #f3dbb9;
            --skin-shadow: #e0b080;
            --ui-gold: #ffd700;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            image-rendering: pixelated; /* Forces pixelated look on all elements */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh; /* Dynamic Viewport Height for mobile browsers */
            background-color: #1a1a1a;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            color: white;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100dvh;
            max-width: 600px;
            margin: 0 auto;
            background: var(--dojo-wall);
            border-left: 8px solid #000;
            border-right: 8px solid #000;
            display: flex;
            flex-direction: column;
        }

        /* 16-Bit Dojo Background */
        .dojo-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60%;
            background: 
                linear-gradient(to bottom, #444 0%, #222 20%, transparent 20%),
                repeating-linear-gradient(90deg, #ccc 0, #ccc 2px, transparent 2px, transparent 40px);
            z-index: 1;
        }

        .scroll {
            position: absolute;
            top: 40px; left: 50%;
            transform: translateX(-50%);
            width: 60px; height: 100px;
            background: #fff;
            border: 4px solid #8b4513;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
            writing-mode: vertical-rl;
            color: #000;
            font-size: 14px;
            text-align: center;
            padding: 5px;
        }

        .tatami-floor {
            position: absolute;
            bottom: 0; width: 100%; height: 45%;
            background-color: var(--tatami-yellow);
            background-image: 
                linear-gradient(var(--tatami-border) 2px, transparent 2px),
                linear-gradient(90deg, var(--tatami-border) 2px, transparent 2px);
            background-size: 100px 50px;
            border-top: 10px solid #5d4037;
            z-index: 2;
        }

        /* UI Layer */
        #ui-layer {
            position: relative;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }

        #status-text {
            font-size: 16px;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0 #000;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-box {
            display: inline-block;
            background: #000;
            padding: 10px;
            border: 4px solid var(--ui-gold);
            font-size: 18px;
            color: var(--ui-gold);
        }

        /* Character Sprites (SVG-Based High Fidelity) */
        .sprite-container {
            position: absolute;
            bottom: 15%;
            width: 200px;
            height: 250px;
            z-index: 5;
            transition: transform 0.1s;
        }

        #referee { left: 50%; transform: translateX(-50%) scale(0.8); bottom: 35%; }
        #player-white { left: 10%; }
        #player-blue { right: 10%; transform: scaleX(-1); }

        /* Animation Classes */
        .bow { transform: rotate(20deg) translateY(10px); transition: 0.5s; }
        .grab-pose { transform: translateX(80px) !important; }
        .blue-recoil { transform: scaleX(-1) translateX(-20px) !important; }
        
        /* Technique: Seoi-nage (Diagram inspired) */
        .throwing-seoinage { animation: seoi-anim 0.6s forwards; }
        @keyframes seoi-anim {
            0% { transform: translateX(80px) rotate(0deg); }
            30% { transform: translateX(100px) translateY(20px) rotate(-20deg); }
            60% { transform: translateX(110px) translateY(10px) rotate(-45deg); }
            100% { transform: translateX(120px) rotate(-10deg); }
        }

        .blue-thrown-seoi { animation: blue-seoi-fly 0.6s forwards; }
        @keyframes blue-seoi-fly {
            0% { transform: scaleX(-1) translateX(-20px); }
            50% { transform: scaleX(-1) translate(-100px, -150px) rotate(90deg); }
            100% { transform: scaleX(-1) translate(-150px, 50px) rotate(180deg); opacity: 0.8; }
        }

        /* Technique: Uchi-mata (Diagram inspired) */
        .throwing-uchimata { animation: uchi-anim 0.6s forwards; }
        @keyframes uchi-anim {
            0% { transform: translateX(80px); }
            50% { transform: translateX(90px) rotate(15deg); }
            100% { transform: translateX(100px) rotate(0deg); }
        }

        .blue-thrown-uchi { animation: blue-uchi-fly 0.6s forwards; }
        @keyframes blue-uchi-fly {
            0% { transform: scaleX(-1); }
            40% { transform: scaleX(-1) translate(-30px, -80px) rotate(45deg); }
            100% { transform: scaleX(-1) translate(-180px, 60px) rotate(220deg); }
        }

        /* Controls */
        #controls {
            position: absolute;
            bottom: 40px;
            width: 100%;
            padding: 0 20px;
            z-index: 100;
        }

        .pixel-btn {
            width: 100%;
            padding: 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-bottom: 8px solid #c0392b;
            cursor: pointer;
            text-shadow: 2px 2px 0 #000;
        }

        .pixel-btn:active {
            margin-top: 4px;
            border-bottom-width: 4px;
        }

        .pixel-btn:disabled {
            background: #7f8c8d;
            border-bottom-color: #95a5a6;
        }

        /* Confetti & Flash */
        .flash { animation: screen-flash 0.1s 3; }
        @keyframes screen-flash {
            0%, 100% { background: var(--dojo-wall); }
            50% { background: #fff; }
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="dojo-bg">
        <div class="scroll">柔道</div> <!-- "Judo" in Kanji -->
    </div>
    <div class="tatami-floor"></div>

    <div id="ui-layer">
        <div id="status-text">시합 대기</div>
        <div class="timer-box" id="timer-display">[00:00.00]</div>
    </div>

    <div id="match-area">
        <!-- Referee Sprite -->
        <div id="referee" class="sprite-container">
            <svg viewBox="0 0 100 150">
                <rect x="35" y="10" width="30" height="30" fill="var(--skin-tone)" /> <!-- Head -->
                <rect x="35" y="25" width="30" height="5" fill="var(--skin-shadow)" />
                <rect x="25" y="40" width="50" height="80" fill="#000" /> <!-- Suit -->
                <rect x="40" y="50" width="20" height="30" fill="#fff" /> <!-- Shirt -->
                <rect x="48" y="50" width="4" height="30" fill="#000" /> <!-- Tie -->
            </svg>
        </div>

        <!-- White Player (Tori) - Enhanced Gi Detail -->
        <div id="player-white" class="sprite-container">
            <svg viewBox="0 0 120 200">
                <!-- Articulated body parts for pixel-shading look -->
                <rect x="40" y="10" width="40" height="40" fill="var(--skin-tone)" /> 
                <rect x="40" y="35" width="40" height="10" fill="var(--skin-shadow)" />
                <!-- Gi Body -->
                <path d="M20,50 L100,50 L110,140 L10,140 Z" fill="var(--white-gi)" />
                <path d="M60,50 L100,50 L110,140 L60,140 Z" fill="var(--white-gi-shadow)" opacity="0.3"/>
                <!-- Belt -->
                <rect x="10" y="100" width="100" height="12" fill="#000" />
                <!-- Legs -->
                <rect x="25" y="140" width="30" height="50" fill="var(--white-gi)" />
                <rect x="65" y="140" width="30" height="50" fill="var(--white-gi)" />
                <rect x="25" y="180" width="30" height="10" fill="var(--skin-tone)" />
                <rect x="65" y="180" width="30" height="10" fill="var(--skin-tone)" />
            </svg>
        </div>

        <!-- Blue Player (Uke) -->
        <div id="player-blue" class="sprite-container">
            <svg viewBox="0 0 120 200">
                <rect x="40" y="10" width="40" height="40" fill="var(--skin-tone)" />
                <path d="M20,50 L100,50 L110,140 L10,140 Z" fill="var(--blue-gi)" />
                <path d="M60,50 L100,50 L110,140 L60,140 Z" fill="var(--blue-gi-shadow)" opacity="0.4"/>
                <rect x="10" y="100" width="100" height="12" fill="#000" />
                <rect x="25" y="140" width="30" height="50" fill="var(--blue-gi)" />
                <rect x="65" y="140" width="30" height="50" fill="var(--blue-gi)" />
            </svg>
        </div>
    </div>

    <div id="controls">
        <button id="main-btn" class="pixel-btn">시합 시작<br>(START)</button>
    </div>
</div>

<script>
    /**
     * JUDO REACTION ENGINE
     * Refactored for professional pixel-art animations and precise timing.
     */
    const state = {
        IDLE: 'IDLE',
        BOWING: 'BOWING',
        READY: 'READY',
        GRABBED: 'GRABBED',
        FINISH: 'FINISH',
        FOUL: 'FOUL'
    };

    let curState = state.IDLE;
    let startTime = 0;
    let reactionTimer = null;
    let stopwatchInterval = null;

    const btn = document.getElementById('main-btn');
    const status = document.getElementById('status-text');
    const timerTxt = document.getElementById('timer-display');
    const tori = document.getElementById('player-white'); // Player
    const uke = document.getElementById('player-blue');   // Opponent
    const container = document.getElementById('game-container');

    // High Precision Timer Formatter [SS:SS.SS]
    function formatTime(ms) {
        const total = ms / 1000;
        const s = Math.floor(total % 60).toString().padStart(2, '0');
        const msPart = (total % 1).toFixed(2).substring(2);
        return `[00:${s}.${msPart}]`;
    }

    function resetVisuals() {
        tori.className = 'sprite-container';
        uke.className = 'sprite-container';
        container.classList.remove('flash');
        status.style.color = "white";
    }

    function triggerFoul() {
        clearTimeout(reactionTimer);
        curState = state.FOUL;
        status.textContent = "반칙패 / FALSE START!";
        status.style.color = "#ff4444";
        btn.textContent = "RESTART";
        btn.disabled = false;
        tori.style.opacity = "0.5";
    }

    function startMatch() {
        curState = state.BOWING;
        resetVisuals();
        btn.disabled = true;
        btn.textContent = "WAIT...";
        status.textContent = "차렷, 경례! (REI)";
        
        // Bow Animation (State 1: Bowing)
        tori.classList.add('bow');
        uke.classList.add('bow');

        setTimeout(() => {
            tori.classList.remove('bow');
            uke.classList.remove('bow');
            curState = state.READY;
            status.textContent = "준비... (Hajime soon)";
            
            // Random delay between 1.5 and 3.5 seconds
            const delay = Math.random() * 2000 + 1500;
            reactionTimer = setTimeout(onGrabTrigger, delay);
        }, 1200);
    }

    function onGrabTrigger() {
        curState = state.GRABBED;
        startTime = performance.now();
        
        // Visual Trigger
        status.textContent = "잡았다! (GRABBED!)";
        status.style.color = "#ffff00";
        btn.disabled = false;
        btn.textContent = "THROW! (메치기)";
        btn.style.backgroundColor = "#2ecc71";
        btn.style.borderBottomColor = "#27ae60";

        // Animation: Collar Grab (Based on diagram contact point)
        tori.classList.add('grab-pose');
        uke.classList.add('blue-recoil');

        stopwatchInterval = setInterval(() => {
            const now = performance.now();
            timerTxt.textContent = formatTime(now - startTime);
        }, 10);
    }

    function performThrow() {
        clearInterval(stopwatchInterval);
        const finalTime = performance.now() - startTime;
        curState = state.FINISH;
        
        container.classList.add('flash');
        
        // Logic for technique selection
        const isSeoi = Math.random() > 0.5;
        const techniqueName = isSeoi ? "업어치기 (Seoi-nage)" : "허벅다리 (Uchi-mata)";
        
        status.textContent = `한판! (IPPON!)\n${techniqueName}`;
        timerTxt.textContent = formatTime(finalTime);

        // Apply specific animation frames inspired by image_0.png diagrams
        if (isSeoi) {
            tori.classList.add('throwing-seoinage');
            uke.classList.add('blue-thrown-seoi');
        } else {
            tori.classList.add('throwing-uchimata');
            uke.classList.add('blue-thrown-uchi');
        }

        createConfetti();
        
        btn.textContent = "REMATCH";
        btn.style.backgroundColor = "#e74c3c";
        btn.style.borderBottomColor = "#c0392b";
    }

    function createConfetti() {
        for (let i = 0; i < 40; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + '%';
            c.style.top = '20%';
            c.style.backgroundColor = ['#f1c40f', '#fff', '#e74c3c', '#3498db'][Math.floor(Math.random()*4)];
            document.body.appendChild(c);
            
            const destX = (Math.random() - 0.5) * 300;
            const destY = Math.random() * 400 + 200;
            
            c.animate([
                { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
                { transform: `translate(${destX}px, ${destY}px) rotate(720deg)`, opacity: 0 }
            ], {
                duration: 1000 + Math.random() * 1000,
                easing: 'cubic-bezier(0, .9, .6, 1)'
            }).onfinish = () => c.remove();
        }
    }

    function handleInteraction() {
        if (curState === state.IDLE || curState === state.FINISH || curState === state.FOUL) {
            startMatch();
        } else if (curState === state.READY) {
            triggerFoul();
        } else if (curState === state.GRABBED) {
            performThrow();
        }
    }

    // Touch and Click Support
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleInteraction(); });
    btn.addEventListener('mousedown', (e) => { e.preventDefault(); handleInteraction(); });

</script>
</body>
</html>
