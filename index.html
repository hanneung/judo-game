<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUDO REACTION 16-BIT ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --tatami-yellow: #d4bc82;
            --tatami-border: #8b7355;
            --dojo-wall: #e0d7c6;
            --white-gi: #ffffff;
            --white-gi-shadow: #c0c0c0;
            --blue-gi: #2b5797;
            --blue-gi-shadow: #1a3a63;
            --skin-tone: #f3dbb9;
            --skin-shadow: #d1b18a;
            --ui-gold: #ffd700;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100dvh;
            background-color: #111; overflow: hidden;
            font-family: 'Press Start 2P', cursive; color: white;
        }

        #game-container {
            position: relative; width: 100%; height: 100dvh;
            max-width: 600px; margin: 0 auto;
            background: var(--dojo-wall);
            border-left: 10px solid #000; border-right: 10px solid #000;
            display: flex; flex-direction: column;
        }

        /* 16-Bit Dojo Background */
        .dojo-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 60%;
            background: 
                linear-gradient(to bottom, #333 0%, #111 20%, transparent 20%),
                repeating-linear-gradient(90deg, #b0a796 0, #b0a796 4px, transparent 4px, transparent 40px);
            z-index: 1;
        }

        .scroll {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 120px; background: #fff;
            border: 6px solid #5c3a21; box-shadow: 6px 6px 0 rgba(0,0,0,0.4);
            writing-mode: vertical-rl; color: #000; font-size: 20px;
            text-align: center; padding: 10px; font-weight: bold;
        }

        .tatami-floor {
            position: absolute; bottom: 0; width: 100%; height: 45%;
            background-color: var(--tatami-yellow);
            background-image: 
                linear-gradient(var(--tatami-border) 4px, transparent 4px),
                linear-gradient(90deg, var(--tatami-border) 4px, transparent 4px);
            background-size: 120px 60px;
            border-top: 12px solid #3e2723; z-index: 2;
        }

        /* 고도화된 UI 레이어 (가독성/크기 대폭 개선) */
        #ui-layer {
            position: relative; z-index: 10; padding: 30px 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        #status-container {
            background-color: #222;
            border: 6px solid var(--ui-gold);
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 6px 6px 0 #000;
            border-radius: 4px;
        }

        #status-text {
            font-size: 28px; /* 한글 폰트 크기 대폭 확대 */
            text-shadow: 3px 3px 0 #000;
            text-align: center;
            line-height: 1.5;
            margin: 0;
            white-space: pre-wrap;
        }

        .timer-box {
            background: #000; padding: 15px 25px;
            border: 6px solid #fff; font-size: 32px;
            color: #fff; box-shadow: 6px 6px 0 #000;
        }

        /* Character Sprites (픽셀 테두리 추가를 위한 CSS/SVG 연동) */
        .sprite-container {
            position: absolute; bottom: 15%; width: 220px; height: 260px;
            z-index: 5; transition: transform 0.2s, left 0.3s, right 0.3s;
        }

        /* SVG 내부 픽셀 아트 스타일
