<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUDO REACTION 16-BIT ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --tatami-yellow: #d8c289;
            --tatami-border: #a38c62;
            --dojo-wall: #e8e1d5;
            --white-gi: #ffffff;
            --white-gi-shadow: #d4d4d4;
            --blue-gi: #2a528a;
            --blue-gi-shadow: #1b3863;
            --skin-tone: #fcdfb6;
            --skin-shadow: #dfaf7e;
            --ui-gold: #ffd700;
            
            --stroke-white: #b0b0b0;
            --stroke-blue: #163057;
            --stroke-skin: #d19b66;
            --stroke-dark: #222222;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; 
            height: 100vh; /* 데스크탑 호환성(Fallback) 추가 */
            height: 100dvh;
            background-color: #111; overflow: hidden;
            font-family: 'Press Start 2P', cursive; color: white;
        }

        #game-container {
            position: relative; width: 100%; 
            height: 100vh; /* 데스크탑 호환성(Fallback) 추가 */
            height: 100dvh;
            max-width: 600px; margin: 0 auto;
            background: var(--dojo-wall);
            border-left: 8px solid #000; border-right: 8px solid #000;
            display: flex; flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* 배경 */
        .dojo-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 60%;
            background: 
                linear-gradient(to bottom, #2c2c2c 0%, #1a1a1a 18%, transparent 18%),
                repeating-linear-gradient(90deg, #c4baa8 0, #c4baa8 4px, transparent 4px, transparent 40px);
            z-index: 1;
        }

        .scroll {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 120px; background: #fffdf7;
            border: 4px solid #5c3a21; box-shadow: 4px 6px 0 rgba(0,0,0,0.3);
            writing-mode: vertical-rl; color: #111; font-size: 20px;
            text-align: center; padding: 12px; font-weight: bold;
        }

        .tatami-floor {
            position: absolute; bottom: 0; width: 100%; height: 45%;
            background-color: var(--tatami-yellow);
            background-image: 
                linear-gradient(var(--tatami-border) 3px, transparent 3px),
                linear-gradient(90deg, var(--tatami-border) 3px, transparent 3px);
            background-size: 100px 50px;
            border-top: 10px solid #4a3219; z-index: 2;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.1);
        }

        /* UI 레이어 */
        #ui-layer {
            position: relative; z-index: 10; padding: 25px 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        #status-container {
            background-color: #222;
            border: 4px solid var(--ui-gold);
            padding: 12px 25px;
            margin-bottom: 15px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.8);
            border-radius: 4px;
        }

        #status-text {
            font-size: 22px; 
            text-shadow: 2px 2px 0 #000;
            text-align: center;
            line-height: 1.4;
            margin: 0;
            white-space: pre-wrap;
            color: #fff;
        }

        .timer-box {
            background: #111; padding: 12px 20px;
            border: 4px solid #fff; font-size: 26px;
            color: #fff; box-shadow: 4px 4px 0 rgba(0,0,0,0.8);
            border-radius: 2px;
            letter-spacing: 2px;
        }

        /* 캐릭터 크기 축소 및 간격 대폭 확대 */
        .sprite-container {
            position: absolute; bottom: 15%; 
            width: 150px; height: 200px;
            z-index: 5; transition: transform 0.2s, left 0.3s, right 0.3s;
        }

        svg { shape-rendering: crispEdges; }
        .stroke-white { stroke: var(--stroke-white); stroke-width: 2.5px; }
        .stroke-blue { stroke: var(--stroke-blue); stroke-width: 2.5px; }
        .stroke-skin { stroke: var(--stroke-skin); stroke-width: 2.5px; }
        .stroke-dark { stroke: var(--stroke-dark); stroke-width: 2.5px; }

        #referee { left: 50%; transform: translateX(-50%) scale(0.6); bottom: 35%; }
        
        #player-white { left: 0%; }
        #player-blue { right: 0%; transform: scaleX(-1); }

        #player-white.bow-white { transform: rotate(25deg) translateY(10px) !important; }
        #player-blue.bow-blue { transform: scaleX(-1) rotate(25deg) translateY(10px) !important; } 
        
        .arm { transition: transform 0.15s ease-out; transform-origin: top center; }
        .face-part { transition: all 0.1s; }

        #player-white.grab-white { left: 16% !important; }
        #player-white.grab-white .arm-front { transform: rotate(-75deg); }
        
        #player-blue.grab-blue { right: 16% !important; transform: scaleX(-1); }
        #player-blue.grab-blue .arm-front { transform: rotate(-75deg); }

        #player-white.tori-seoi { animation: tori-seoi-anim 0.6s forwards; }
        @keyframes tori-seoi-anim {
            0% { left: 16%; transform: scaleX(1); }
            30% { left: 35%; transform: scaleX(-1) translateY(20px); }
            100% { left: 40%; transform: scaleX(-1) rotate(-30deg); }
        }

        #player-blue.uke-seoi { animation: uke-seoi-anim 0.6s forwards; }
        @keyframes uke-seoi-anim {
            0% { right: 16%; transform: scaleX(-1); }
            40% { right: 40%; transform: scaleX(-1) translate(-100px, -200px) rotate(140deg); }
            100% { right: 70%; transform: scaleX(-1) translate(-250px, 90px) rotate(280deg); opacity: 0.8; }
        }

        #player-white.tori-uchi { animation: tori-uchi-anim 0.6s forwards; }
        @keyframes tori-uchi-anim {
            0% { left: 16%; }
            40% { left: 35%; transform: rotate(20deg); }
            100% { left: 40%; transform: rotate(-10deg); }
        }

        #player-blue.uke-uchi { animation: uke-uchi-anim 0.6s forwards; }
        @keyframes uke-uchi-anim {
            0% { right: 16%; transform: scaleX(-1); }
            40% { right: 35%; transform: scaleX(-1) translate(-60px, -160px) rotate(100deg); }
            100% { right: 80%; transform: scaleX(-1) translate(-250px, 100px) rotate(240deg); opacity: 0.8; }
        }

        /* 하단 메치기 버튼 */
        #controls { position: absolute; bottom: 20px; width: 100%; padding: 0 20px; z-index: 100; }
        
        .pixel-btn {
            width: 100%; padding: 20px; 
            font-family: 'Press Start 2P', cursive;
            font-size: 20px; 
            background: rgba(231, 76, 60, 0.85); 
            color: white;
            border: none; border-bottom: 6px solid rgba(192, 57, 43, 0.9); cursor: pointer;
            text-shadow: 2px 2px 0 #000; box-shadow: 0 4px 0 rgba(0,0,0,0.5);
            line-height: 1.5;
            border-radius: 6px;
            backdrop-filter: blur(2px);
            transition: background 0.1s;
        }
        
        .pixel-btn:active { margin-top: 6px; border-bottom-width: 0px; box-shadow: 0 0 0 rgba(0,0,0,0); }
        
        /* 모바일 터치 이벤트를 막는 :disabled 대신, 클래스를 통한 비활성화 디자인 적용 */
        .pixel-btn.wait-state { 
            background: rgba(127, 140, 141, 0.85) !important; 
            border-bottom-color: rgba(85, 85, 85, 0.9) !important; 
        }

        .flash { animation: screen-flash 0.15s 2; }
        @keyframes screen-flash { 0%, 100% { background: var(--dojo-wall); } 50% { background: #fff; } }
        
        .confetti { position: absolute; width: 10px; height: 10px; z-index: 1000; border: 1px solid #000; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="dojo-bg"><div class="scroll">柔道</div></div>
    <div class="tatami-floor"></div>

    <div id="ui-layer">
        <div id="status-container">
            <div id="status-text">시합 대기</div>
        </div>
        <div class="timer-box" id="timer-display">00:00.00</div>
    </div>

    <div id="match-area">
        <div id="referee" class="sprite-container">
            <svg viewBox="0 0 120 200">
                <ellipse cx="60" cy="180" rx="35" ry="10" fill="rgba(0,0,0,0.2)" />
                <rect x="40" y="20" width="40" height="40" fill="var(--skin-tone)" class="stroke-skin" />
                <rect x="40" y="45" width="40" height="15" fill="var(--skin-shadow)" />
                <g id="face-ref">
                    <rect x="50" y="30" width="6" height="6" fill="#000" />
                    <rect x="64" y="30" width="6" height="6" fill="#000" />
                    <rect x="54" y="46" width="12" height="3" fill="#000" />
                </g>
                <rect x="30" y="60" width="60" height="80" fill="#222" class="stroke-dark" />
                <rect x="45" y="60" width="30" height="30" fill="#fff" class="stroke-white" />
                <rect x="56" y="60" width="8" height="40" fill="#c0392b" /> 
            </svg>
        </div>

        <div id="player-white" class="sprite-container">
            <svg viewBox="0 0 120 200">
                <ellipse cx="60" cy="190" rx="40" ry="12" fill="rgba(0,0,0,0.2)" /> 
                <rect class="arm arm-back stroke-white" x="18" y="55" width="24" height="65" fill="var(--white-gi)" />
                <rect x="40" y="10" width="40" height="40" fill="var(--skin-tone)" class="stroke-skin"/> 
                <rect x="40" y="35" width="40" height="15" fill="var(--skin-shadow)" />
                <g id="face-white">
                    <rect class="face-part" x="48" y="22" width="6" height="6" fill="#000" />
                    <rect class="face-part" x="66" y="22" width="6" height="6" fill="#000" />
                    <rect class="face-part mouth" id="mouth-white" x="55" y="36" width="10" height="4" fill="#000" />
                </g>
                <path d="M25,50 L95,50 L105,140 L15,140 Z" fill="var(--white-gi)" class="stroke-white" />
                <path d="M60,50 L95,50 L105,140 L60,140 Z" fill="var(--white-gi-shadow)" opacity="0.3" />
                <rect x="30" y="140" width="25" height="50" fill="var(--white-gi)" class="stroke-white"/>
                <rect x="65" y="140" width="25" height="50" fill="var(--white-gi)" class="stroke-white"/>
                <rect x="30" y="190" width="25" height="10" fill="var(--skin-tone)" class="stroke-skin"/>
                <rect x="65" y="190" width="25" height="10" fill="var(--skin-tone)" class="stroke-skin"/>
                <rect x="25" y="105" width="70" height="14" fill="#222" class="stroke-dark" />
                <rect class="arm arm-front stroke-white" x="78" y="55" width="24" height="65" fill="var(--white-gi)" />
            </svg>
        </div>

        <div id="player-blue" class="sprite-container">
            <svg viewBox="0 0 120 200">
                <ellipse cx="60" cy="190" rx="40" ry="12" fill="rgba(0,0,0,0.2)" />
                <rect class="arm arm-back stroke-blue" x="18" y="55" width="24" height="65" fill="var(--blue-gi)" />
                <rect x="40" y="10" width="40" height="40" fill="var(--skin-tone)" class="stroke-skin"/>
                <rect x="40" y="35" width="40" height="15" fill="var(--skin-shadow)" />
                <g id="face-blue">
                    <rect class="face-part" x="48" y="22" width="6" height="6" fill="#000" />
                    <rect class="face-part" x="66" y="22" width="6" height="6" fill="#000" />
                    <rect class="face-part mouth" id="mouth-blue" x="55" y="36" width="10" height="4" fill="#000" />
                </g>
                <path d="M25,50 L95,50 L105,140 L15,140 Z" fill="var(--blue-gi)" class="stroke-blue" />
                <path d="M60,50 L95,50 L105,140 L60,140 Z" fill="var(--blue-gi-shadow)" opacity="0.4" />
                <rect x="30" y="140" width="25" height="50" fill="var(--blue-gi)" class="stroke-blue"/>
                <rect x="65" y="140" width="25" height="50" fill="var(--blue-gi)" class="stroke-blue"/>
                <rect x="30" y="190" width="25" height="10" fill="var(--skin-tone)" class="stroke-skin"/>
                <rect x="65" y="190" width="25" height="10" fill="var(--skin-tone)" class="stroke-skin"/>
                <rect x="25" y="105" width="70" height="14" fill="#222" class="stroke-dark" />
                <rect class="arm arm-front stroke-blue" x="78" y="55" width="24" height="65" fill="var(--blue-gi)" />
            </svg>
        </div>
    </div>

    <div id="controls">
        <button id="main-btn" class="pixel-btn">시합 시작<br>(START)</button>
    </div>
</div>

<script>
    const state = { IDLE: 'IDLE', BOWING: 'BOWING', READY: 'READY', GRABBED: 'GRABBED', FINISH: 'FINISH', FOUL: 'FOUL' };
    let curState = state.IDLE;
    let startTime = 0;
    let reactionTimer = null;
    let stopwatchInterval = null;

    const btn = document.getElementById('main-btn');
    const status = document.getElementById('status-text');
    const timerTxt = document.getElementById('timer-display');
    const tori = document.getElementById('player-white'); 
    const uke = document.getElementById('player-blue');   
    const container = document.getElementById('game-container');

    function formatTime(ms) {
        const totalSeconds = ms / 1000;
        const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
        const s = Math.floor(totalSeconds % 60).toString().padStart(2, '0');
        const msPart = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
        return `${m}:${s}.${msPart}`;
    }

    function setFace(player, type) {
        const mouth = document.getElementById(`mouth-${player}`);
        if (!mouth) return;
        
        if (type === 'tense') {
            mouth.setAttribute('width', '18');
            mouth.setAttribute('x', '51');
            mouth.setAttribute('height', '4');
            mouth.removeAttribute('rx');
        } else if (type === 'shock') {
            mouth.setAttribute('width', '14');
            mouth.setAttribute('height', '14');
            mouth.setAttribute('x', '53');
            mouth.setAttribute('y', '32');
            mouth.setAttribute('rx', '4');
        } else {
            mouth.setAttribute('width', '10');
            mouth.setAttribute('height', '4');
            mouth.setAttribute('x', '55');
            mouth.setAttribute('y', '36');
            mouth.removeAttribute('rx');
        }
    }

    function resetVisuals() {
        tori.className = 'sprite-container';
        uke.className = 'sprite-container';
        container.classList.remove('flash');
        status.style.color = "white";
        tori.style.opacity = "1";
        uke.style.opacity = "1";
        setFace('white', 'idle');
        setFace('blue', 'idle');
        
        // CSS 클래스를 통해 버튼 비활성화 시각 효과 제거
        btn.classList.remove('wait-state'); 
        timerTxt.textContent = "00:00.00";
    }

    function triggerFoul() {
        clearTimeout(reactionTimer);
        curState = state.FOUL;
        status.innerHTML = "반칙패<br>FALSE START";
        status.style.color = "#ff4444";
        btn.innerHTML = "다시 시작<br>(RESTART)";
        
        // CSS 클래스를 통해 버튼 비활성화 시각 효과 제거
        btn.classList.remove('wait-state'); 
        tori.style.opacity = "0.5";
    }

    function startMatch() {
        curState = state.BOWING;
        resetVisuals();
        
        // disabled 속성 대신 CSS 클래스 추가
        btn.classList.add('wait-state'); 
        btn.textContent = "WAIT...";
        status.innerHTML = "차렷, 경례!<br>(REI)";
        
        tori.classList.add('bow-white');
        uke.classList.add('bow-blue');

        setTimeout(() => {
            tori.classList.remove('bow-white');
            uke.classList.remove('bow-blue');
            curState = state.READY;
            status.innerHTML = "준비...<br>(HAJIME)";
            
            const delay = Math.random() * 2000 + 1500;
            reactionTimer = setTimeout(onGrabTrigger, delay);
        }, 1200);
    }

    function onGrabTrigger() {
        curState = state.GRABBED;
        startTime = performance.now();
        
        status.innerHTML = "잡았다!<br>(GRABBED!)";
        status.style.color = "#ffd700";
        
        // CSS 클래스를 통해 버튼 비활성화 시각 효과 제거
        btn.classList.remove('wait-state'); 
        btn.innerHTML = "메치기!<br>(THROW!)";
        
        // 버튼을 초록색 계열로 인라인 변경 (wait-state 클래스가 없으므로 정상 적용됨)
        btn.style.backgroundColor = "rgba(46, 204, 113, 0.85)";
        btn.style.borderBottomColor = "rgba(39, 174, 96, 0.9)";

        tori.classList.add('grab-white');
        uke.classList.add('grab-blue');
        setFace('white', 'tense'); 
        setFace('blue', 'shock');  

        stopwatchInterval = setInterval(() => {
            const now = performance.now();
            timerTxt.textContent = formatTime(now - startTime);
        }, 10);
    }

    function performThrow() {
        clearInterval(stopwatchInterval);
        const finalTime = performance.now() - startTime;
        curState = state.FINISH;
        
        container.classList.add('flash');
        
        const isSeoi = Math.random() > 0.5;
        const techniqueName = isSeoi ? "업어치기!" : "허벅다리!";
        
        status.innerHTML = `한판!<br>${techniqueName}`;
        timerTxt.textContent = formatTime(finalTime);

        tori.classList.remove('grab-white');
        uke.classList.remove('grab-blue');

        if (isSeoi) {
            tori.classList.add('tori-seoi');
            uke.classList.add('uke-seoi');
        } else {
            tori.classList.add('tori-uchi');
            uke.classList.add('uke-uchi');
        }

        createConfetti();
        
        btn.innerHTML = "다시 하기<br>(REMATCH)";
        // 버튼을 빨간색 계열로 리셋
        btn.style.backgroundColor = "rgba(231, 76, 60, 0.85)";
        btn.style.borderBottomColor = "rgba(192, 57, 43, 0.9)";
    }

    function createConfetti() {
        for (let i = 0; i < 40; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + '%';
            c.style.top = '10%';
            c.style.backgroundColor = ['#f1c40f', '#fff', '#e74c3c', '#3498db'][Math.floor(Math.random()*4)];
            document.body.appendChild(c);
            
            const destX = (Math.random() - 0.5) * 500;
            const destY = Math.random() * 500 + 300;
            
            c.animate([
                { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
                { transform: `translate(${destX}px, ${destY}px) rotate(720deg)`, opacity: 0 }
            ], {
                duration: 1000 + Math.random() * 1000,
                easing: 'cubic-bezier(0, .9, .6, 1)'
            }).onfinish = () => c.remove();
        }
    }

    function handleInteraction() {
        if (curState === state.IDLE || curState === state.FINISH || curState === state.FOUL) {
            startMatch();
        } else if (curState === state.READY) {
            triggerFoul();
        } else if (curState === state.GRABBED) {
            performThrow();
        }
    }

    // 모바일 터치 및 데스크탑 클릭 리스너 (disabled 속성이 없으므로 모바일에서도 완벽하게 감지됨)
    btn.addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        handleInteraction(); 
    }, { passive: false });
    
    btn.addEventListener('mousedown', (e) => { 
        e.preventDefault(); 
        handleInteraction(); 
    });

</script>
</body>
</html>
