<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUDO REACTION 16-BIT ULTIMATE</title>

    <style>
        :root {
            --tatami-yellow: #d8c289;
            --tatami-border: #a38c62;
            --dojo-wall: #e8e1d5;
            --white-gi: #ffffff;
            --white-gi-shadow: #d4d4d4;
            --blue-gi: #2a528a;
            --blue-gi-shadow: #1b3863;
            --skin-tone: #fcdfb6;
            --skin-shadow: #dfaf7e;
            --ui-gold: #ffd700;
            
            --stroke-white: #b0b0b0;
            --stroke-blue: #163057;
            --stroke-skin: #d19b66;
            --stroke-dark: #222222;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 데스크톱 호환을 위한 높이 및 중앙 정렬 수정 */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #111; overflow: hidden;
            display: flex; justify-content: center; align-items: center; /* 데스크톱 중앙 정렬 */
            font-family: 'Press Start 2P', cursive; color: white;
        }

        /* PC 화면에서는 모바일 뷰 크기로 제한 */
        #game-container {
            position: relative; width: 100%; height: 100%;
            max-width: 600px; max-height: 900px; /* 데스크톱 화면 높이 제한 */
            background: var(--dojo-wall);
            border: 8px solid #000;
            display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); /* 그림자 강화 */
        }

        /* 배경 */
        .dojo-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 60%;
            background: 
                linear-gradient(to bottom, #2c2c2c 0%, #1a1a1a 18%, transparent 18%),
                repeating-linear-gradient(90deg, #c4baa8 0, #c4baa8 4px, transparent 4px, transparent 40px);
            z-index: 1;
        }

        .scroll {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 120px; background: #fffdf7;
            border: 4px solid #5c3a21; box-shadow: 4px 6px 0 rgba(0,0,0,0.3);
            writing-mode: vertical-rl; color: #111; font-size: 20px;
            text-align: center; padding: 12px; font-weight: bold;
        }
